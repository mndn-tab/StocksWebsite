{% extends "layout.html" %}

{% block body %}

    {% if name %}
        <h3>You are logged in as {{ name }}. </h3> <br>
        <a href="/form">Get A Specific Stock</a> <br>
        <a href="/stocks/{{ name }}"> Get All Stocks</a> <br>
        <a href="/logout">Logout</a> <br>


    {% else %}
        you are not logged in. <br>
        <a href="/login">Login</a> <br>
    {% endif %}

{% endblock %}
